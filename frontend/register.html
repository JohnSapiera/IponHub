<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join IponHub | Create Free Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans flex items-center justify-center min-h-screen p-6">

    <div class="bg-gray-800 p-8 rounded-3xl shadow-2xl w-full max-w-md border border-gray-700">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-green-500 mb-2">Create Account</h1>
            <p class="text-gray-400">Join the community and start earning.</p>
        </div>

        <form action="#" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Full Name</label>
                <input type="text" placeholder="Juan Dela Cruz" 
                    class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-green-500 transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Mobile Number (Username)</label>
                <input type="tel" placeholder="09123456789" 
                    class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-green-500 transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Email Address</label>
                <input type="email" placeholder="example@mail.com" 
                    class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-green-500 transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1 text-green-500">Referral Code (Optional)</label>
                <input type="text" placeholder="ENTER-CODE" 
                    class="w-full bg-gray-900 border border-green-900 rounded-xl px-4 py-3 focus:outline-none focus:border-green-500 text-green-500 uppercase font-bold tracking-widest placeholder:text-green-900">
            </div>

            <p class="text-xs text-gray-500 text-center">
                By clicking register, you agree to our 1-week maturation policy and credit system rules.
            </p>

            <button type="submit" 
                class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-green-900/20 transition duration-300">
                Register for Free
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-gray-400">Already have an account? <a href="#" class="text-green-500 hover:underline">Log In</a></p>
        </div>
    </div>

</body>
</html>
