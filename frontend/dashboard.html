<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | IponHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">

    <nav class="p-4 bg-gray-800 border-b border-gray-700 flex justify-between items-center">
        <h2 class="text-xl font-bold text-green-500">IPONHUB</h2>
        <div class="flex items-center space-x-3">
            <span class="bg-gray-700 px-3 py-1 rounded-full text-xs font-semibold">Free Member</span>
            <div class="w-8 h-8 bg-green-600 rounded-full flex items-center justify-center font-bold">J</div>
        </div>
    </nav>

    <main class="p-6 max-w-lg mx-auto">
        <div class="bg-gradient-to-br from-green-600 to-green-800 p-6 rounded-3xl shadow-xl mb-6">
            <p class="text-green-100 text-sm opacity-80">Total Credits (1:1 PHP)</p>
            <h1 class="text-4xl font-black mt-1">0.00</h1>
            <div class="mt-6 flex justify-between items-center">
                <button class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-xl text-sm font-bold backdrop-blur-sm">
                    View History
                </button>
                <p class="text-xs text-green-200">Updates every 24h</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8 text-center">
            <div class="bg-gray-800 p-4 rounded-2xl border border-gray-700">
                <div class="text-2xl mb-1">📱</div>
                <p class="text-xs font-semibold">Get Mobile Load</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-2xl border border-gray-700 border-dashed border-green-500/50">
                <div class="text-2xl mb-1">📈</div>
                <p class="text-xs font-semibold text-green-500">Unlock Plus</p>
            </div>
        </div>

        <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 mb-6">
            <h3 class="font-bold text-lg mb-2 text-gray-200">Your Referral Code</h3>
            <div class="flex items-center bg-gray-900 p-3 rounded-xl border border-gray-700 border-dashed">
                <span class="text-xl font-mono font-bold tracking-widest text-green-500 flex-grow text-center">REF-12345</span>
                <button class="text-xs bg-gray-700 px-3 py-1 rounded-lg hover:bg-gray-600">Copy</button>
            </div>
            <p class="text-xs text-gray-500 mt-3 text-center">Earn credits for every successful invite!</p>
        </div>

        <div class="mb-20">
            <h3 class="font-bold text-gray-400 text-sm mb-4 uppercase tracking-widest">Active Contracts</h3>
            <div class="text-center py-10 border-2 border-dashed border-gray-800 rounded-3xl">
                <p class="text-gray-600 italic">No active contracts yet.</p>
                <a href="#" class="text-green-500 text-sm font-bold mt-2 inline-block">Start your first 1-week plan →</a>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 w-full bg-gray-800 border-t border-gray-700 flex justify-around p-4 shadow-2xl">
        <button class="text-green-500 flex flex-col items-center">
            <span class="text-xl">🏠</span>
            <span class="text-[10px]">Home</span>
        </button>
        <button class="text-gray-500 flex flex-col items-center">
            <span class="text-xl">📜</span>
            <span class="text-[10px]">Contracts</span>
        </button>
        <button class="text-gray-500 flex flex-col items-center">
            <span class="text-xl">⚙️</span>
            <span class="text-[10px]">Settings</span>
        </button>
    </div>

</body>
</html>
