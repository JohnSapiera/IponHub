<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IponHub | Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --white: #ffffff;
            --neon-green: #39FF14;
            --brand-green: #2E7D32;
            --logo-red: #EA4335;
            --logo-yellow: #FBBC05;
            --logo-blue: #4285F4;
            --neon-blue: #00E5FF;
            --neon-red: #FF3D00;
            --cloud-shadow: rgba(129, 212, 250, 0.6);
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--white); min-height: 100vh; display: flex; flex-direction: column; align-items: center; margin: 0; overflow-x: hidden; }

        /* 🌦️ WEATHER SYSTEM */
        .cover-area { width: 100%; height: 140px; position: relative; z-index: 1; background: linear-gradient(180deg, #40C4FF 0%, #B3E5FC 100%); transition: background 1.5s ease; border-bottom: 3px solid var(--white); overflow: hidden; }
        .lightning-flash { position: absolute; width: 100%; height: 100%; background: white; opacity: 0; z-index: 10; pointer-events: none; }
        @keyframes flashAnim { 0% { opacity: 0; } 10% { opacity: 0.8; } 15% { opacity: 0; } 20% { opacity: 0.7; } 25% { opacity: 0; } }
        .rain-layer { position: absolute; width: 100%; height: 100%; z-index: 2; display: none; }
        .rain-layer.active { display: block; }
        .rain-layer::before { content: ''; position: absolute; width: 100%; height: 100%; background-image: linear-gradient(to bottom, rgba(255,255,255,0.2) 15%, transparent 15%); background-size: 2px 25px; animation: rainDrop 0.15s linear infinite; }
        @keyframes rainDrop { from { transform: translateY(-25px); } to { transform: translateY(25px); } }
        .vector-cloud { position: absolute; background: var(--white); border-radius: 50px; box-shadow: inset 0 -15px 0 var(--cloud-shadow); animation: vectorMove var(--speed) linear infinite; }
        .vector-cloud::before, .vector-cloud::after { content: ''; position: absolute; background: inherit; border-radius: 50%; box-shadow: inherit; }
        .v1 { width: 180px; height: 60px; top: 15%; --speed: 35s; left: -200px; }
        .v1::before { width: 90px; height: 90px; top: -50px; left: 30px; }
        .v1::after { width: 70px; height: 70px; top: -30px; right: 20px; }
        @keyframes vectorMove { from { transform: translateX(-100px); } to { transform: translateX(calc(100vw + 300px)); } }

        /* 📱 TABLET & IPHONE FRAME */
        .mini-tablet { background: #1A1A1A; width: 135px; height: 80px; border-radius: 14px; padding: 5px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); position: relative; z-index: 10; margin-top: -40px; }
        .tablet-screen { background: var(--white); width: 100%; height: 100%; border-radius: 10px; display: flex; justify-content: center; align-items: center; overflow: hidden; border: 0.5px solid #000; }
        .brand-name { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -1.5px; color: var(--brand-green); }
        
        .iphone-frame { width: 92%; max-width: 360px; margin-top: 20px; padding: 4px; background: var(--neon-green); border-radius: 50px; box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.15); animation: float 5s ease-in-out infinite; }
        .white-stroke { background: var(--white); padding: 2px; border-radius: 47px; }
        .neon-inner-stroke { background: var(--neon-green); padding: 2px; border-radius: 45px; }
        .dashboard-content { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(14px); border-radius: 43px; padding: 25px 22px; min-height: 520px; display: flex; flex-direction: column; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-12px); } }

        /* 💰 BALANCE & BUTTONS */
        .balance-amount { font-family: 'Montserrat', sans-serif; font-size: 32px; color: #1a1a1a; line-height: 1; margin-top: 5px; }
        .balance-amount span { color: var(--brand-green); font-size: 20px; margin-right: 2px; }
        .btn-dash { flex: 1; padding: 15px; border-radius: 18px; font-weight: 800; font-size: 13px; text-transform: uppercase; transition: 0.2s; }
        .btn-cashin { background: var(--brand-green); color: white; }
        .btn-withdraw { border: 2.5px solid var(--brand-green); color: var(--brand-green); }

        /* 🔒 LOCK OVERLAYS */
        .lock-overlay { position: absolute; inset: 0; z-index: 30; background: rgba(255,255,255,0.5); backdrop-filter: blur(1.5px); display: flex; items-center; justify-content: center; border-radius: 12px; }

        /* 📦 MODALS */
        .modal-box { background: white; width: 100%; max-width: 340px; border-radius: 40px; padding: 30px 25px; position: relative; border: 3px solid var(--neon-green); }
        .bar { flex: 1; height: 6px; border-radius: 10px; background: #eee; }
        .active-red { background: var(--neon-red); }
        .active-blue { background: var(--neon-blue); }
        .active-green { background: var(--neon-green); }
        .btn-submit { width: 100%; margin-top: 20px; padding: 16px; border-radius: 18px; font-weight: 800; transition: 0.3s; opacity: 0.4; pointer-events: none; }
        .btn-submit.ready { opacity: 1; pointer-events: auto; }

        /* Icons */
        .paper-bg { width: 35px; height: 45px; background: white; border: 1.5px solid #ddd; border-radius: 5px; transform: rotate(-5deg); position: relative; }
        .coin-icon { width: 50px; height: 50px; background: #FBBC05; border-radius: 50%; border: 3px dashed #B8860B; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div class="cover-area" id="cebu-sky">
        <div class="lightning-flash" id="lightning"></div>
        <div class="rain-layer" id="rain"></div>
        <div class="vector-cloud v1"></div>
        <div class="vector-cloud v1" style="animation-delay: -15s; top: 40%;"></div>
    </div>

    <div class="mini-tablet">
        <div class="tablet-screen">
            <div class="brand-name">Ipon<span style="color:var(--logo-red)">H</span><span style="color:var(--logo-yellow)">u</span><span style="color:var(--logo-blue)">b</span></div>
        </div>
    </div>

    <div class="iphone-frame">
        <div class="white-stroke">
            <div class="neon-inner-stroke">
                <div class="dashboard-content">
                    
                    <div class="wallet-wrap">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Account Balance</p>
                                <h1 class="balance-amount" id="displayBalance"><span>₱</span>0.00</h1>
                            </div>
                            <div class="text-[10px] bg-green-100 text-green-700 px-2 py-1 rounded-md font-bold" id="userTier">FREE</div>
                        </div>
                        <div class="flex gap-3 mt-6">
                            <button onclick="openModal('cashinModal')" class="btn-dash btn-cashin">Cash In</button>
                            <button class="btn-dash btn-withdraw">Withdraw</button>
                        </div>
                    </div>

                    <div class="flex items-center gap-8 mt-10 ml-2">
                        <div onclick="checkAccess('prospectingModal')" class="flex flex-col items-start cursor-pointer relative group">
                            <div id="lock-prospecting" class="lock-overlay hidden text-lg">🔒</div>
                            <div class="w-16 h-16 flex items-center justify-center">
                                <div class="paper-bg"></div>
                            </div>
                            <p class="text-[9px] font-black text-gray-400 mt-2 uppercase tracking-widest">Prospecting</p>
                        </div>

                        <div onclick="checkAccess('dealsModal')" class="flex flex-col items-center cursor-pointer relative group">
                            <div id="lock-deals" class="lock-overlay hidden text-lg">🔒</div>
                            <div class="coin-icon"><span class="text-xl font-black text-amber-900">₱</span></div>
                            <p class="text-[9px] font-black text-gray-400 mt-2 uppercase tracking-widest">Deals</p>
                        </div>
                    </div>

                    <div class="mt-auto pb-4 text-center opacity-20"><div class="w-12 h-1 bg-gray-500 mx-auto rounded-full"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div id="cashinModal" class="fixed inset-0 z-[100] hidden bg-black/60 backdrop-blur-sm items-center justify-center p-5">
        <div class="modal-box">
            <span class="absolute right-6 top-6 text-2xl text-gray-300 cursor-pointer" onclick="closeModal('cashinModal')">&times;</span>
            <h2 class="text-center font-black text-gray-800 mb-5 uppercase">GCash Cash In</h2>
            <div class="space-y-4">
                <input type="number" id="gcashNum" class="w-full p-4 rounded-xl border-2 border-gray-100 font-bold outline-none" placeholder="GCash Number" oninput="validateForm()">
                <div id="amountGroup" class="hidden"><input type="number" id="amountVal" class="w-full p-4 rounded-xl border-2 border-gray-100 font-bold outline-none" placeholder="Amount" oninput="validateForm()"></div>
                <div id="refGroup" class="hidden"><input type="text" id="refNum" class="w-full p-4 rounded-xl border-2 border-gray-100 font-bold outline-none" placeholder="Reference Number" oninput="validateForm()"></div>
                
                <div class="flex gap-1 mt-4">
                    <div id="bar1" class="bar"></div><div id="bar2" class="bar"></div><div id="bar3" class="bar"></div>
                </div>
                <button id="submitBtn" class="btn-submit bg-gray-100 text-gray-400" onclick="submitRequest()">CONFIRM</button>
            </div>
        </div>
    </div>

    <div id="prospectingModal" class="fixed inset-0 z-[100] hidden bg-black/60 backdrop-blur-sm items-center justify-center p-5">
         <div class="modal-box text-center">
            <span class="absolute right-6 top-6 text-2xl text-gray-300 cursor-pointer" onclick="closeModal('prospectingModal')">&times;</span>
            <h2 class="font-bold mb-4">PROSPECTING LIST</h2>
            <p class="text-sm text-gray-500">Premium features for IponHub Plus users.</p>
         </div>
    </div>

    <script>
        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUser = null;
        let currentStatus = "Free";

        // --- AUTH & LIVE DATA ---
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                // Live Listener para sa Balance at Account Status
                db.ref('users/' + user.uid).on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        currentStatus = data.account_status || "Free";
                        
                        // Reflect Balance
                        const formattedBal = new Intl.NumberFormat('en-PH', { minimumFractionDigits: 2 }).format(data.balance || 0);
                        document.getElementById('displayBalance').innerHTML = `<span>₱</span>${formattedBal}`;
                        
                        // Update UI based on Status
                        document.getElementById('userTier').innerText = currentStatus.toUpperCase();
                        updateLocks(currentStatus);
                    }
                });
            } else {
                window.location.href = "index.html"; // Balik sa login
            }
        });

        function updateLocks(status) {
            const isFree = (status === "Free");
            document.getElementById('lock-prospecting').classList.toggle('hidden', !isFree);
            document.getElementById('lock-deals').classList.toggle('hidden', !isFree);
        }

        function checkAccess(modalId) {
            if (currentStatus === "Free") {
                alert("🔒 Exclusive for Plus Plan! Please cash in to upgrade.");
            } else {
                openModal(modalId);
            }
        }

        // --- CASH IN LOGIC ---
        function submitRequest() {
            const req = {
                uid: currentUser.uid,
                phone: document.getElementById('gcashNum').value,
                amount: document.getElementById('amountVal').value,
                ref: document.getElementById('refNum').value,
                status: "Pending",
                date: new Date().toISOString()
            };

            db.ref('cashin_requests').push(req).then(() => {
                alert("✅ Submitted! Please wait for admin verification.");
                closeModal('cashinModal');
            });
        }

        function validateForm() {
            const g = document.getElementById('gcashNum').value, a = document.getElementById('amountVal').value, r = document.getElementById('refNum').value;
            const b1 = document.getElementById('bar1'), b2 = document.getElementById('bar2'), b3 = document.getElementById('bar3'), btn = document.getElementById('submitBtn');
            
            document.getElementById('amountGroup').classList.toggle('hidden', g.length < 11);
            document.getElementById('refGroup').classList.toggle('hidden', a.length < 1);
            
            [b1, b2, b3].forEach(b => b.className = 'bar');
            btn.classList.remove('ready');

            if (r.length >= 5) {
                [b1, b2, b3].forEach(b => b.classList.add('active-green'));
                btn.classList.add('ready'); btn.innerText = "CONFIRM";
            } else if (a.length >= 1) {
                b1.classList.add('active-blue'); b2.classList.add('active-blue');
            } else if (g.length > 0) {
                b1.classList.add('active-red');
            }
        }

        function openModal(id) { document.getElementById(id).classList.replace('hidden', 'flex'); }
        function closeModal(id) { document.getElementById(id).classList.replace('flex', 'hidden'); }

        // --- WEATHER SYNC ---
        async function updateWeather() {
            const sky = document.getElementById('cebu-sky');
            const hour = new Date().getHours();
            if (hour >= 18 || hour < 5) sky.style.background = "linear-gradient(180deg, #0B0E14 0%, #1A237E 100%)";
            else if (hour >= 16) sky.style.background = "linear-gradient(180deg, #E64A19 0%, #FFB74D 100%)";

            try {
                const resp = await fetch('https://api.openweathermap.org/data/2.5/weather?q=Cebu&appid=da0650965e6d628f844b24131df33246');
                const data = await resp.json();
                if (data.weather[0].main === 'Rain') document.getElementById('rain').classList.add('active');
            } catch (e) { console.log("Weather offline"); }
        }
        updateWeather();
    </script>
</body>
</html>
