<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IponHub | Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f7fa;
}

/* PHONE FRAME */
.phone {
    max-width: 360px;
    margin: 40px auto;
    background: white;
    border-radius: 30px;
    padding: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
}

/* BALANCE */
.balance {
    font-size: 32px;
    font-weight: bold;
}

/* BUTTONS */
.btn {
    width: 100%;
    padding: 14px;
    border-radius: 15px;
    font-weight: bold;
}

.btn-green {
    background: #2E7D32;
    color: white;
}

.btn-outline {
    border: 2px solid #2E7D32;
    color: #2E7D32;
}

/* MODAL */
.modal {
    position: fixed;
    inset: 0;
    display: none;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
}

.modal-box {
    background: white;
    padding: 25px;
    border-radius: 20px;
    width: 90%;
    max-width: 320px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="phone">

    <!-- BALANCE -->
    <p class="text-gray-500 text-sm">Current Balance</p>
    <div class="balance" id="balance">₱1,000,000.00</div>

    <!-- BUTTONS -->
    <div class="flex gap-3 mt-5">
        <button onclick="openModal()" class="btn btn-green">Cash In</button>
        <button class="btn btn-outline">Withdraw</button>
    </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-box">

        <h2 class="text-center font-bold mb-3">GCash Cash In</h2>

        <input type="number" id="gcash" placeholder="GCash Number">
        <input type="number" id="amount" placeholder="Amount">
        <input type="text" id="ref" placeholder="Reference Number">

        <button onclick="submitPayment()" id="submitBtn" class="btn btn-green mt-4">
            SUBMIT
        </button>

        <button onclick="closeModal()" class="btn mt-2">Cancel</button>

    </div>
</div>

<script>

/* MODAL */
function openModal() {
    document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
}

/* PAYMENT FLOW */
function submitPayment() {

    const btn = document.getElementById('submitBtn');
    const amount = parseFloat(document.getElementById('amount').value) || 0;

    if (amount <= 0) {
        alert("Enter valid amount");
        return;
    }

    // STEP 1: PENDING
    btn.innerText = "PROCESSING...";
    btn.disabled = true;

    // STEP 2: SIMULATE CONFIRMATION
    setTimeout(() => {

        // STEP 3: CONFIRMED → UPDATE BALANCE
        let balanceEl = document.getElementById('balance');
        let current = parseFloat(balanceEl.innerText.replace(/[₱,]/g,'')) || 0;

        let newBalance = current + amount;

        balanceEl.innerText = "₱" + newBalance.toLocaleString(undefined, {
            minimumFractionDigits: 2
        });

        alert("✅ Payment Confirmed!");

        // RESET
        btn.innerText = "SUBMIT";
        btn.disabled = false;

        document.getElementById('gcash').value = "";
        document.getElementById('amount').value = "";
        document.getElementById('ref').value = "";

        closeModal();

    }, 2500);
}

</script>

</body>
</html>
