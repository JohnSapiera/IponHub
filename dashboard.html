<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IponHub | My Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="cover_weather.css">
    
    <style>
        :root {
            --white: #ffffff;
            --neon-green: #39FF14;
            --brand-green: #2E7D32;
            --logo-red: #EA4335;
            --logo-yellow: #FBBC05;
            --logo-blue: #4285F4;
            --neon-blue: #00E5FF;
            --neon-red: #FF3D00;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--white); min-height: 100vh; display: flex; flex-direction: column; align-items: center; margin: 0; overflow-x: hidden; }

        /* Ang .cover-area styles ay wala na rito dahil nasa cover_weather.css na */

        /* 📱 TABLET LANDSCAPE */
        .mini-tablet { background: #1A1A1A; width: 135px; height: 80px; border-radius: 14px; padding: 5px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); position: relative; z-index: 10; margin-top: -40px; }
        .tablet-screen { background: var(--white); width: 100%; height: 100%; border-radius: 10px; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; border: 0.5px solid #000; }
        
        .brand-wrapper { position: relative; display: inline-block; }
        .brand-name { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -1.5px; color: var(--brand-green); position: relative; z-index: 1; }
        
        .shine-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; mix-blend-mode: overlay; 
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 50%, rgba(255,255,255,0) 100%); 
            background-size: 200% 100%; animation: brandShine 3s ease-in-out infinite; 
        }
        @keyframes brandShine { 0% { background-position: 200% 0; } 45% { background-position: -100% 0; } 100% { background-position: -100% 0; } }

        /* 📱 IPHONE FRAME & DASHBOARD CONTENT */
        .iphone-frame { width: 92%; max-width: 360px; margin-top: 20px; padding: 4px; background: var(--neon-green); border-radius: 50px; box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.15); position: relative; animation: float 5s ease-in-out infinite; }
        .white-stroke { background: var(--white); padding: 2px; border-radius: 47px; }
        .neon-inner-stroke { background: var(--neon-green); padding: 2px; border-radius: 45px; }
        .dashboard-content { background: rgba(255, 255, 255, 0.78); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border-radius: 43px; padding: 25px 22px; min-height: 520px; display: flex; flex-direction: column; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-12px); } }

        .thin-gray-line { width: 100%; height: 1px; background: #e0e0e0; }
        .balance-amount { font-family: 'Montserrat', sans-serif; font-size: 36px; color: #1a1a1a; line-height: 1; margin-top: 5px; }
        .balance-amount span { color: var(--brand-green); font-size: 22px; }
        .refresh-circle { width: 34px; height: 34px; background: white; border: 1.5px solid var(--neon-green); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; }

        .btn-dash { flex: 1; padding: 15px; border-radius: 18px; font-weight: 800; font-size: 13px; text-transform: uppercase; }
        .btn-cashin { background: var(--brand-green); color: white; }
        .btn-withdraw { border: 2.5px solid var(--brand-green); color: var(--brand-green); }

        /* 🔍 ICONS */
        .paper-bg { width: 35px; height: 45px; background: white; border: 1.5px solid #ddd; border-radius: 5px; padding: 8px; display: flex; flex-direction: column; gap: 4px; transform: rotate(-5deg); transition: 0.3s; }
        .paper-line { height: 2px; background: #eee; border-radius: 2px; }
        .magnifier { position: absolute; bottom: 0px; right: 0px; transform: scale(0.8); transition: 0.4s; }
        .glass { width: 35px; height: 35px; border: 3px solid var(--brand-green); background: rgba(57, 255, 20, 0.1); border-radius: 50%; }
        .handle { width: 4px; height: 12px; background: var(--brand-green); margin-left: 28px; margin-top: -2px; transform: rotate(-45deg); border-radius: 4px; }

        .coin-icon { width: 50px; height: 50px; background: #FBBC05; border-radius: 50%; border: 3px dashed #B8860B; display: flex; justify-content: center; align-items: center; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .coin-icon:hover { transform: rotate(360deg) scale(1.1); }
        .peso-sign { font-weight: 900; color: #8B4513; font-size: 22px; }

        /* 📦 MODALS */
        .modal-box { background: white; width: 100%; max-width: 340px; border-radius: 40px; padding: 30px 25px; position: relative; border: 3px solid var(--neon-green); }
        .glass-oblong { background: rgba(0, 0, 0, 0.03); border: 1px solid rgba(0, 0, 0, 0.05); border-radius: 20px; padding: 15px; margin-bottom: 12px; }
        .thought-bubble { background: var(--neon-green); color: #000; padding: 5px 12px; border-radius: 15px 15px 15px 2px; font-size: 11px; font-weight: 800; animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }

        .bar { flex: 1; height: 6px; border-radius: 10px; background: #eee; }
        .active-red { background: var(--neon-red); animation: blink 1s infinite; }
        .active-blue { background: var(--neon-blue); animation: blink 1s infinite; }
        .active-green { background: var(--neon-green); }
        @keyframes blink { 50% { opacity: 0.5; } }
        .btn-submit { width: 100%; margin-top: 20px; padding: 16px; border-radius: 18px; font-weight: 800; opacity: 0.4; pointer-events: none; transition: 0.3s; }
        .btn-submit.ready { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>

    <div class="cover-area" id="cebu-sky">
        <div class="lightning-flash" id="lightning"></div>
        <div class="rain-layer" id="rain"></div>
        <div id="cloud-container">
            <div class="vector-cloud v1"></div>
            <div class="vector-cloud v1" style="animation-delay: -12s; top: 38%; opacity: 0.7;"></div>
            <div class="vector-cloud v1" style="animation-delay: -22s; top: 10%; opacity: 0.5; transform: scale(0.6);"></div>
        </div>
    </div>

    <div class="mini-tablet">
        <div class="tablet-screen">
            <div class="brand-wrapper">
                <div class="brand-name">
                    Ipon<span style="color:var(--logo-red)">H</span><span style="color:var(--logo-yellow)">u</span><span style="color:var(--logo-blue)">b</span>
                </div>
                <div class="shine-overlay"></div>
            </div>
        </div>
    </div>

    <div class="iphone-frame">
        <div class="white-stroke">
            <div class="neon-inner-stroke">
                <div class="dashboard-content">
                    
                    <div class="wallet-wrap">
                        <div class="balance-header flex justify-between">
                            <div>
                                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Current Balance</p>
                                <h1 class="balance-amount"><span>₱</span>1,000,000.00</h1>
                            </div>
                            <div class="refresh-circle" onclick="location.reload()"><span class="text-green-600 font-bold">↻</span></div>
                        </div>
                        <div class="action-group flex gap-3 mt-6">
                            <button onclick="openModal('cashinModal')" class="btn-dash btn-cashin shadow-lg">Cash In</button>
                            <button class="btn-dash btn-withdraw">Withdrawal</button>
                        </div>
                    </div>

                    <div class="flex items-center gap-8 mt-10 ml-2">
                        <div onclick="openModal('prospectingModal')" class="flex flex-col items-start cursor-pointer group">
                            <div class="relative w-16 h-16 flex items-center justify-center">
                                <div class="paper-bg"><div class="paper-line w-6"></div><div class="paper-line w-4"></div><div class="paper-line w-7"></div></div>
                                <div class="magnifier"><div class="glass"></div><div class="handle"></div></div>
                            </div>
                            <p class="text-[9px] font-black text-gray-400 mt-2 uppercase tracking-widest group-hover:text-green-500">Prospecting</p>
                        </div>
                        <div onclick="openModal('dealsModal')" class="flex flex-col items-center cursor-pointer group">
                            <div class="coin-icon"><span class="peso-sign">₱</span></div>
                            <p class="text-[9px] font-black text-gray-400 mt-2 uppercase tracking-widest group-hover:text-yellow-600">Deals</p>
                        </div>
                    </div>

                    <div class="divider-container my-7">
                        <div class="thin-gray-line"></div>
                        <div class="thin-gray-line mt-[2px]"></div>
                    </div>

                    <div class="mt-auto pb-6 opacity-30 text-center"><div class="w-16 h-1.5 bg-gray-400 rounded-full mx-auto"></div></div>

                </div>
            </div>
        </div>
    </div>

    <div id="cashinModal" class="fixed inset-0 z-[100] hidden bg-black/50 backdrop-blur-sm items-center justify-center p-5">...</div>
    <div id="prospectingModal" class="fixed inset-0 z-[100] hidden bg-black/50 backdrop-blur-sm items-center justify-center p-5">...</div>
    <div id="dealsModal" class="fixed inset-0 z-[100] hidden bg-black/50 backdrop-blur-sm items-center justify-center p-5">...</div>

    <script>
        // Local Dashboard Scripts (Modals only)
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); }
        function validateForm() { /* your existing gcash logic */ }
        function confirmPayment() { alert("✅ Payment Successful!"); closeModal('cashinModal'); }
    </script>

    <script src="weather.js"></script>

</body>
</html>
